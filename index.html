<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacky Mathieu</title>
    <style>
        *{
          margin:0;
          padding:0;
          box-sizing:border-box;
          font-family: Arial, Helvetica, sans-serif;
        }
    
        body{
          background: linear-gradient(135deg, #006847, #009c3b);
          height:100vh;
        }
    
        /* MENU */
        nav{
          width:100%;
          background: rgba(0,0,0,0.25);
          backdrop-filter: blur(8px);
          padding: 18px 40px;
          border-bottom: 3px solid #ffdf00;
        }
    
        .menu{
          display:flex;
          justify-content:space-between;
          align-items:center;
        }
    
        .logo{
          color:#fff;
          font-size:28px;
          font-weight:bold;
          text-transform:uppercase;
          letter-spacing:2px;
        }
    
        .logo span{
          color:#ffdf00;
        }
    
        .menu ul{
          display:flex;
          list-style:none;
          gap:25px;
        }
    
        .menu ul li a{
          text-decoration:none;
          color:#fff;
          font-size:18px;
          font-weight:bold;
          padding:10px 18px;
          border-radius:30px;
          transition:0.3s;
          position:relative;
        }
    
        .menu ul li a:hover{
          background:#ffdf00;
          color:#006847;
          transform:translateY(-2px);
          box-shadow:0 4px 10px rgba(0,0,0,0.3);
        }
    
        /* HERO */
        .hero{
          display:flex;
          flex-direction:column;
          justify-content:center;
          align-items:center;
          text-align:center;
          height:calc(100vh - 80px);
          color:white;
          padding:20px;
        }
    
        .hero h1{
          font-size:64px;
          margin-bottom:20px;
          text-shadow:3px 3px 10px rgba(0,0,0,0.4);
        }
    
        .hero p{
          font-size:22px;
          max-width:700px;
          margin-bottom:30px;
        }
    
        .btn{
          background:#ffdf00;
          color:#006847;
          padding:15px 35px;
          border:none;
          border-radius:40px;
          font-size:18px;
          font-weight:bold;
          cursor:pointer;
          transition:0.3s;
        }
    
        .btn:hover{
          transform:scale(1.05);
          background:#fff;
        }
    
        /* RESPONSIVO */
        @media(max-width:768px){
    
          .menu{
            flex-direction:column;
            gap:15px;
          }
    
          .menu ul{
            flex-wrap:wrap;
            justify-content:center;
          }
    
          .hero h1{
            font-size:42px;
          }
    
          .hero p{
            font-size:18px;
          }
        }
      </style>
</head>
<body>
    <nav>
        <div class="menu">
    
          <div class="logo">
            Copa<span>2026</span>
          </div>
    
          <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Seleções</a></li>
            <li><a href="#">Jogos</a></li>
            <li><a href="#">Estádios</a></li>
            <li><a href="#">Contato</a></li>
          </ul>
    
        </div>
      </nav>
    
      <section class="hero">
        <h1>⚽ Copa do Mundo ⚽</h1>
    
        <p>
          Viva a emoção do maior campeonato de futebol do planeta.
          Acompanhe jogos, seleções, estatísticas e muito mais!
        </p>
    
        <button class="btn">Ver Tabela</button>
      </section>
    <footer> 
        <p>Jacky Mathieu</p>
    </footer>
</body>
</html>
